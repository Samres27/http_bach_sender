{% load static tailwind_tags %}

<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8">
    <title>Respuestas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="{% static 'css/output.css' %}" rel="stylesheet" type="text/css" />
</head>

<body class="bg-[#0F172A] text-[#E2E8F0] min-h-screen p-8 flex flex-col flex-1">

    <!-- Panel Superior -->
    <div class="bg-[#0F172A] p-6 rounded-t-xl  flex justify-between items-center">
        <h1 class="text-2xl font-bold text-[#E2E8F0] tracking-wider">Respuestas</h1>
        <div class="flex gap-4">

            <a href="/"><button
                    class="btn px-4 bg-[#38BDF8] text-[#0F172A] border-0 hover:bg-[#7DD3FC] hover:text-[#0F172A] font-semibold rounded-sm">
                    VOLVER
                </button></a>
        </div>
    </div>
    <div class="flex flex-col flex-1 w-full h-full">
        <!-- Contenedor Principal -->
        <div class="bg-[#0F172A] p-6 border border-[#334155] rounded-xl flex-1">

            <!-- Tabla de Datos -->
            <div class="overflow-x-auto rounded-lg border border-[#334155]">
                <table class="table w-full">
                    <thead>
                        <tr class="bg-[#1E293B] text-[#94A3B8] border-b border-[#334155]">
                            <th class="text-[#94A3B8] font-medium">ID Petición</th>
                            <th class="text-[#94A3B8] font-medium">Método</th>
                            <th class="text-[#94A3B8] font-medium">Dominio</th>
                            <th class="text-[#94A3B8] font-medium">URL</th>
                            <th class="text-[#94A3B8] font-medium">Estado</th>
                        </tr>
                    </thead>
                    <tbody class="text-center">
                        <!-- Fila normal -->
                        {% for x in peticiones %}
                        <tr onclick="seleccionarFila(this)" id="{{x.nroPeticion}}" class="hover:bg-[#1E293B] border-b border-[#334155]">
                            <td class="text-[#E2E8F0]">{{x.nroPeticion}}</td>
                            <td><span class="badge bg-[#334155] text-[#E2E8F0] border-0">{{x.metodo}}</span></td>
                            <td class="text-[#E2E8F0]">{{x.dominio}}</td>
                            <td class="text-[#E2E8F0]">{{x.url}}</td>
                            <td><span class="text-[#94A3B8] font-semibold">{{x.codigo_respuesta}}</span></td>
                        </tr>
                        {% endfor%}
                    </tbody>
                </table>
            </div>
        </div>

        <h2 class="text-xl font-bold text-[#E2E8F0] tracking-wider ml-6 mt-1 mb-1">Detalle</h2>
        <div class="bg-[#0F172A] p-6 border border-[#334155] rounded-xl flex-1 flex flex-col">
            <textarea id="inputText" class="input mt-2 flex-1 " readonly>
            </textarea>
            <script>
                jsonString = '{{peticionesJson | escapejs}}'
                data_json = JSON.parse(jsonString);



                function buscarPorId(id) {
                    console.log(id)
                    return data_json.find(item => item.nroPeticion === id);
                }
                function seleccionarFila(fila) {
                    //const datos = JSON.parse(jsonString);
                    //const datos = data_json;
                    //console.log(datos)
                    // 3. Función para buscar

                    // Busca todas las filas de la tabla
                    var filas = fila.parentElement.getElementsByTagName("tr");

                    // Quita el color amarillo de las otras filas
                    for (var i = 0; i < filas.length; i++) {
                        if (fila.id != filas[i].id) {
                            filas[i].classList.remove("border-l-4");
                            filas[i].classList.remove("bg-[#1E293B]");
                            filas[i].classList.add("hover:bg-[#1E293B]")
                        } else {
                            filas[i].classList.remove("hover:bg-[#1E293B]");
                        }
                    }

                    console.log(fila.id)
                    fila.classList.add("border-l-4");
                    fila.classList.add("bg-[#1E293B]");
                    const encontrado = buscarPorId(Number(fila.id));
                    console.log(encontrado["respuesta"])
                    document.getElementById('inputText').value = encontrado["respuesta"]
                }
            </script>

            <script>

                (function () {
                    'use strict';

                    // ----- DOM -----
                    const textarea = document.getElementById('inputText');
                    const toastEl = document.getElementById('toast');
                    console.log(JSON.stringify(textarea.value))
                    // ----- Estado -----
                    let rawText = '';      // texto real con caracteres especiales
                    let escapedText = '';  // versión escapada (se muestra en textarea)

                    // ----- Utilidades -----
                    function escapeHtml(str) {
                        const div = document.createElement('div');
                        div.textContent = str;
                        return div.innerHTML;
                    }

                    function showToast(msg, duration = 2000) {
                        toastEl.textContent = msg;
                        toastEl.classList.add('show');
                        clearTimeout(window._toastTimer);
                        window._toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
                    }

                    function escapeChar(char) {
                        const code = char.charCodeAt(0);
                        if (code === 13) return '\\r';
                        if (code === 10) return '\n';
                        if (code === 9) return '\\t';
                        if (code === 0) return '\\0';
                        if (code === 27) return '\\x1B';
                        if (code < 32 || code === 127 || code > 127) {
                            const hex = code.toString(16).toUpperCase().padStart(2, '0');
                            return '\\x' + hex;
                        }
                        return char;
                    }

                    function escapeString(str) {
                        let result = '';
                        for (let i = 0; i < str.length; i++) {
                            result += escapeChar(str[i]);
                        }
                        return result;
                    }

                    // Desescapar (interpretar secuencias) a caracteres reales
                    function unescapeString(str) {
                        return str.replace(/\\(r|t|0|x([0-9A-Fa-f]{2}))/g, function (match, p1, p2) {
                            if (p1 === 'r') return '\r';
                            if (p1 === 't') return '\t';
                            if (p1 === '0') return '\0';
                            if (p1 === 'x' && p2) {
                                return String.fromCharCode(parseInt(p2, 16));
                            }
                            return match;
                        });
                    }


                    // ----- Sincronizar todo a partir del textarea (escapedText) -----
                    function syncFromTextarea() {
                        const input = textarea.value;
                        escapedText = input;
                        // Interpretar escapes para obtener raw
                        rawText = unescapeString(input);

                    }

                    // ----- Eventos -----
                    textarea.addEventListener('input', syncFromTextarea);

                    // ----- Inicializar -----
                    function init() {
                        // El textarea ya tiene un ejemplo
                        syncFromTextarea();
                    }

                    init();



                })();
            </script>

        </div>
    </div>
</body>

</html>
