{% load tailwind_tags %}

<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Cola</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#0F172A] text-[#E2E8F0] min-h-screen p-8 flex flex-col flex-1">

    <!-- Panel Superior -->
    <div class="bg-[#0F172A] p-6 rounded-t-xl border-b border-[#334155] flex justify-between items-center">
        <h1 class="text-2xl font-bold text-[#E2E8F0] tracking-wider">COLA DE PETICIONES</h1>
        <div class="flex gap-4">
            <button
                class="btn px-4 bg-[#38BDF8] text-[#0F172A] border-0 hover:bg-[#7DD3FC] hover:text-[#0F172A] font-semibold rounded-sm">
                EJECUTAR
            </button>
            <a href="{% url 'editar' %}"><button
                    class="btn px-4 bg-[#38BDF8] text-[#0F172A] border-0 hover:bg-[#7DD3FC] hover:text-[#0F172A] font-semibold rounded-sm">
                    AÑADIR
                </button> </a>
        </div>
    </div>

    <!-- Contenedor Principal -->
    <div class="bg-[#0F172A] p-6 border-x border-b border-[#334155] rounded-b-xl flex flex-col flex-1">

        <!-- Tabla de Datos -->
        <div class="overflow-x-auto rounded-lg border border-[#334155] flex-1">
            <table class="table w-full">
                <thead>
                    <tr class="bg-[#1E293B] text-[#94A3B8] border-b border-[#334155]">
                        <th class="text-[#94A3B8] font-medium">ID Petición</th>
                        <th class="text-[#94A3B8] font-medium">Método</th>
                        <th class="text-[#94A3B8] font-medium">Dominio</th>
                        <th class="text-[#94A3B8] font-medium">URL</th>
                    </tr>
                </thead>
                <tbody class="text-center overflow-auto">
                    <!-- Fila normal -->
                    {% for x in peticiones %}
                    <tr onclick="seleccionarFila(this)" id="{{x.nroPeticion}}"
                        class="hover:bg-[#1E293B] border-b border-[#334155]">
                        <td class="text-[#E2E8F0]">{{x.nroPeticion}}</td>
                        <td><span class="badge bg-[#334155] text-[#E2E8F0] border-0">{{x.metodo}}</span></td>
                        <td class="text-[#E2E8F0]">{{x.dominio}}</td>
                        <td class="text-[#E2E8F0]">{{x.url}}</td>
                    </tr>
                    {% endfor%}

                </tbody>
            </table>
        </div>

        <!-- Botón Editar -->
        <div class="flex mt-6 gap-2">
            <button type="button" onclick="editarPeticion()"
                class="btn bg-[#38BDF8] text-[#0F172A] border-0 hover:bg-[#7DD3FC] hover:text-[#0F172A] font-bold px-8 shadow-lg rounded-sm">
                EDITAR PETICIÓN
            </button>
            <button type="button" onclick="borrarPeticion()"
                class="btn bg-[#38BDF8] text-[#0F172A] border-0 hover:bg-[#7DD3FC] hover:text-[#0F172A] font-bold px-8 shadow-lg rounded-sm">
                BORRAR PETICIÓN
            </button>
            <button type="button" onclick="borrarPeticionTodo()"
                class=" ml-auto btn bg-[#38BDF8] text-[#0F172A] border-0 hover:bg-[#7DD3FC] hover:text-[#0F172A] font-bold px-8 shadow-lg rounded-sm">
                BORRAR TODO
            </button>
        </div>

    </div>
    <script>
        let nroPeticion = 0
        function seleccionarFila(fila) {
            // Busca todas las filas de la tabla
            var filas = fila.parentElement.getElementsByTagName("tr");
            for (var i = 0; i < filas.length; i++) {
                if (fila.id != filas[i].id) {
                    filas[i].classList.remove("border-l-4");
                    filas[i].classList.remove("bg-[#1E293B]");
                    filas[i].classList.add("hover:bg-[#1E293B]")
                } else {
                    filas[i].classList.remove("hover:bg-[#1E293B]");
                }
            }

            nroPeticion = Number(fila.id)
            fila.classList.add("border-l-4");
            fila.classList.add("bg-[#1E293B]");
        }
        function editarPeticion() {
            if (nroPeticion) {
                window.location.href = "{% url 'editar' %}/" + nroPeticion
            }
        }
        function borrarPeticion() {
            if (nroPeticion) {
                const url = "{% url 'borrar_peticion_uno' 0 %}"
                let urlFinal = url.replace('0', nroPeticion);
                window.location.href = urlFinal
            }
        }
        function borrarPeticionTodo() {
            window.location.href = "{% url 'borrar_peticion_todo' %}"
        }
    </script>

</body>

</html>
