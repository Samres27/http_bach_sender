{% load static tailwind_tags %}

<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8">
    <title>Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="{% static 'css/output.css' %}" rel="stylesheet" type="text/css" />
</head>

<body class="bg-[#0F172A] text-[#E2E8F0] p-8 min-h-screen flex flex-col">
    <!-- 
        Cambio 1: body ahora es min-h-screen flex flex-col 
        para que ocupe toda la altura y pueda repartir espacio.
    -->

    <!-- Contenedor general que agrupa el panel y la tabla -->
    <!-- Le damos flex-1 para que ocupe todo el alto restante y flex flex-col para apilar sus hijos -->
    <div class="flex flex-col flex-1 bg-[#0F172A] rounded-xl border border-[#334155]">
        <!-- Panel Superior (sin cambios) -->
        <div class="p-6 border-b border-[#334155] flex justify-between items-center">
            <h1 class="text-2xl font-bold text-[#E2E8F0] tracking-wider">EDITOR</h1>
            <div class="flex gap-4">
                <a href="{% url 'solicitudes' %}"><button
                        class="btn px-4 bg-[#38BDF8] text-[#0F172A] border-0 hover:bg-[#7DD3FC] hover:text-[#0F172A] font-semibold rounded-sm">
                        VOLVER
                    </button></a>
            </div>
        </div>

        <!-- Contenedor Principal (tabla + botones) -->
        <!-- 
            Cambio 2: este div ahora es flex-1 para ocupar el espacio restante,
            y también flex flex-col para que los hijos se distribuyan verticalmente.
            Además, overflow-hidden para respetar los bordes redondeados.
        -->
        <div class="flex flex-col flex-1 p-6 overflow-hidden">
            <!-- Tabla de Datos -->
            <!-- 
                Cambio 3: el contenedor de la tabla puede crecer con flex-1 y 
                permitir scroll si hay muchas filas. Le ponemos overflow-auto.
            -->
            <div class="flex flex-col flex-1 overflow-auto rounded-lg border border-[#334155]">
                <div class="w-full grid grid-cols-7 gap-4 p-4">
                    <!-- <select id="metodo" name="metodo" class="select rounded-md border border-[#334155] text-center">
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="PATCH">PATCH</option>
                        <option value="HEAD">HEAD</option>
                        <option value="OPTIONS">OPTIONS</option>
                        <option value="TRACE">TRACE</option>
                    </select> -->
                    <div class="text-center text-xl">Dominio: </div>
                    <input class="input col-span-6 ... rounded-lg border border-[#334155]" type="text"
                        placeholder="https://example.com" id="dominio" value="{{peticion.dominio}}">
                    </input>
                </div>
                <div class="w-full flex flex-col flex-1 p-4">
                    <div class="grid controls flex-col grid-cols-3 grap-1 ">
                        <div class="col-span-2 ...">
                            <select id="insertSelect" class="rounded-md border border-[#334155] p-1 ">
                                <option value="\r"> &nbsp; \r (retorno)</option>
                                <option value="\t"> &nbsp; \t (tabulador)</option>
                                <option value="\0"> &nbsp;\0 (nulo)</option>
                                <option value="\x1B"> &nbsp; \x1B (escape)</option>
                                <option value="\x7F"> &nbsp; \x7F (DEL)</option>
                                <option value="custom">✏️ Personalizado</option>
                            </select>
                            <input type="text" id="customCharInput"
                                class="input w-[5ch] rounded-md border border-[#334155]" placeholder="0D"
                                style="display:none;">
                            <button
                                class="btn px-2 bg-[#38BDF8] text-[#0F172A] border-0 hover:bg-[#7DD3FC] hover:text-[#0F172A] font-semibold rounded-sm"
                                id="insertBtn">Insertar</button>
                        </div>

                        <div class="flex justify-end gap-4">
                            <button
                                class="btn px-2 bg-[#38BDF8] text-[#0F172A] border-0 hover:bg-[#7DD3FC] hover:text-[#0F172A] font-semibold rounded-sm"
                                id="copyRawBtn">Copiar raw</button>
                            <button
                                class="btn px-2 bg-[#38BDF8] text-[#0F172A] border-0 hover:bg-[#7DD3FC] hover:text-[#0F172A] font-semibold rounded-sm"
                                id="clearBtn">Limpiar</button>
                        </div>
                    </div>
                    <div class="flex flex-col flex-1 rounded-lg border border-[#334155] w-full p-2 mt-2">
                        <textarea id="inputText" class="input mt-4 flex-1 "
                            placeholder="Escribe secuencias de escape (ej. \r, \t, \x00, \x1B)"></textarea>
                    </div>
                </div>


                <script>
                    let rawText = "{{ peticion.peticion|escapejs }}";
                    console.log("rawText_reciendo cargado :" + rawText)  
                </script>

            </div>
        </div>

        <!-- Botones: los dejamos al final sin flex-1 para que no se estiren -->
        <div class="flex justify-end m-6">
            <div class="mr-auto" id="toast">

            </div>
            
            <button onclick="guardarPeticion()"
                class="btn bg-[#38BDF8] text-[#0F172A] border-0 hover:bg-[#7DD3FC] hover:text-[#0F172A] font-bold px-8 shadow-lg rounded-sm">

                GUARDAR
            </button>
        </div>
        <script>
                (function () {
                    'use strict';

                    // ----- DOM -----
                    const textarea = document.getElementById('inputText');
                    const insertSelect = document.getElementById('insertSelect');
                    const customCharInput = document.getElementById('customCharInput');
                    const insertBtn = document.getElementById('insertBtn');
                    const copyRawBtn = document.getElementById('copyRawBtn');
                    const copyEscapedBtn = document.getElementById('copyEscapedBtn');
                    const clearBtn = document.getElementById('clearBtn');
                    const toastEl = document.getElementById('toast');

                    // ----- Estado -----      // texto real con caracteres especiales
                    let escapedText = '';  // versión escapada (se muestra en textarea)

                    // ----- Utilidades -----
                    function escapeHtml(str) {
                        const div = document.createElement('div');
                        div.textContent = str;
                        return div.innerHTML;
                    }

                    function showToast(msg, duration = 2000) {
                        toastEl.textContent = msg;
                        toastEl.classList.add('show');
                        clearTimeout(window._toastTimer);
                        window._toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
                    }

                    function escapeChar(char) {
                        const code = char.charCodeAt(0);
                        if (code === 13) return '\\r';
                        if (code === 10) return '\\n';
                        if (code === 9) return '\\t';
                        if (code === 0) return '\\0';
                        if (code === 27) return '\\x1B';
                        if (code < 32 || code === 127 || code > 127) {
                            const hex = code.toString(16).toUpperCase().padStart(2, '0');
                            return '\\x' + hex;
                        }
                        return char;
                    }

                    function escapeString(str) {
                        let result = '';
                        for (let i = 0; i < str.length; i++) {
                            result += escapeChar(str[i]);
                        }
                        return result;
                    }

                    // Desescapar (interpretar secuencias) a caracteres reales
                    function unescapeString(str) {
                        return str.replace(/\\(r|n|t|0|x([0-9A-Fa-f]{2}))/g, function (match, p1, p2) {
                            if (p1 === 'r') return '\r';
                            if (p1 === 'n') return '\n';
                            if (p1 === 't') return '\t';
                            if (p1 === '0') return '\0';
                            if (p1 === 'x' && p2) {
                                return String.fromCharCode(parseInt(p2, 16));
                            }
                            return match;
                        });
                    }

                    // ----- Renderizar raw resaltado -----

                    // ----- Sincronizar todo a partir del textarea (escapedText) -----
                    function syncFromTextarea() {
                        const input = textarea.value;
                        escapedText = input;
                        // Interpretar escapes para obtener raw y normalizar \n → \r\n
                        rawText = unescapeString(input).replace(/\r?\n/g, '\r\n');

                    }
                    // ----- Mostrar/ocultar personalizado -----
                    insertSelect.addEventListener('change', function () {
                        if (this.value === 'custom') {
                            customCharInput.style.display = 'inline-block';
                            customCharInput.focus();
                        } else {
                            customCharInput.style.display = 'none';
                        }
                    });
                    // ----- Interceptar pegado (convertir automáticamente a escapes) -----
                    function handlePaste(e) {
                        e.preventDefault();
                        const clipboardData = e.clipboardData || window.clipboardData;
                        const encoder = new TextEncoder();
                        let pasted = clipboardData.getData("text/plain");
                        pasted = pasted.replace(/\r\n|\n/g, '\r\n');
                        if (pasted) {
                            // Escapar el texto pegado
                            const escaped = escapeString(pasted);
                            // Insertar en el cursor
                            const start = textarea.selectionStart;
                            const end = textarea.selectionEnd;
                            const current = textarea.value;
                            const newEscaped = current.substring(0, start) + escaped + current.substring(end);
                            textarea.value = newEscaped;
                            // Después de pegar, sincronizar
                            syncFromTextarea();
                            // Colocar cursor después del texto pegado
                            const newCursor = start + escaped.length;
                            textarea.selectionStart = textarea.selectionEnd = newCursor;
                        }
                    }

                    // ----- Eventos -----
                    textarea.addEventListener('input', syncFromTextarea);
                    textarea.addEventListener('paste', handlePaste);

                    // ----- cargar backend ---
                    document.addEventListener('DOMContentLoaded', function () {
                        console.log("cargado")
                        const escaped = escapeString(rawText);
                        textarea.value = escaped;
                    })

                    // ----- Insertar carácter -----
                    insertBtn.addEventListener('click', function () {
                        let selected = insertSelect.value;
                        let charToInsert = '';

                        if (selected === 'custom') {
                            const custom = customCharInput.value.trim();
                            if (!custom) {
                                showToast('Escribe un valor (ej. 0D para \\r).', 1500);
                                return;
                            }
                            // Interpretar como hex (con o sin 0x) o como carácter literal
                            let hexMatch = custom.match(/^(0x)?([0-9A-Fa-f]{2})$/i);
                            if (hexMatch) {
                                const code = parseInt(hexMatch[2], 16);
                                if (code >= 0 && code <= 255) {
                                    charToInsert = String.fromCharCode(code);
                                } else {
                                    showToast('Código fuera de rango (0-255).', 1500);
                                    return;
                                }
                            } else if (custom.length === 1) {
                                charToInsert = custom;
                            } else {
                                // Intentar interpretar como secuencia de escape literal (ej. \r)
                                const unescaped = unescapeString(custom);
                                if (unescaped !== custom) {
                                    charToInsert = unescaped;
                                } else {
                                    showToast('Formato inválido. Usa hex (0D) o carácter literal.', 1500);
                                    return;
                                }
                            }
                        } else {
                            // Opciones predefinidas (son strings como "\r", "\n", etc.)
                            charToInsert = unescapeString(selected);
                        }

                        if (charToInsert) {
                            // Insertar en rawText (al final, porque no tenemos posición exacta)
                            rawText += charToInsert;
                            rawText = rawText.replace(/\r?\n/g, '\r\n');
                            // Actualizar escaped
                            escapedText = escapeString(rawText);
                            textarea.value = escapedText;
                            syncFromTextarea();
                            customCharInput.value = '';
                            showToast(`Insertado: ${JSON.stringify(charToInsert)}`, 1500);
                        }
                    });

                    // ----- Copiar raw -----
                    copyRawBtn.addEventListener('click', function () {
                        if (!rawText) {
                            showToast('No hay texto raw para copiar.', 1500);
                            return;
                        }
                        navigator.clipboard.writeText(rawText).then(() => {
                            showToast('¡Texto RAW copiado al portapapeles!', 2000);
                        }).catch(() => {
                            const area = document.createElement('textarea');
                            area.value = rawText;
                            document.body.appendChild(area);
                            area.select();
                            document.execCommand('copy');
                            document.body.removeChild(area);
                            showToast('¡Texto RAW copiado!', 2000);
                        });
                    });



                    // ----- Limpiar -----
                    clearBtn.addEventListener('click', function () {
                        rawText = '';
                        escapedText = '';
                        textarea.value = '';
                        syncFromTextarea();
                        showToast('Todo limpiado.', 1000);
                    });

                    // ----- Inicializar -----
                    // function init() {
                    //     // El textarea ya tiene un ejemplo
                    //     syncFromTextarea();
                    // }

                    // init();

                    // Exponer unescapeString globalmente para guardarPeticion
                    window.unescapeString = unescapeString;

                    // Enter en personalizado dispara inserción
                    customCharInput.addEventListener('keydown', function (e) {
                        if (e.key === 'Enter') {
                            insertBtn.click();
                            e.preventDefault();
                        }
                    });

                })();

        </script>
    </div>
    </div>

    <script>
        const nro = "{{peticion.nroPeticion}}"||0
        function validarURLConHost(texto) {
            try {
                const url = new URL(texto);
                // Verifica que sea http o https y que tenga un hostname
                return (url.protocol === 'http:' || url.protocol === 'https:') && url.hostname !== '';
            } catch {
                return false;
            }
        }
        function guardarPeticion() {
            console.log("guaradar peticion")
            const pdominio = document.getElementById('dominio');

            if (!validarURLConHost(pdominio.value)) {
                document.getElementById("toast").innerText = "Dominio no valido, revise el campo dominio"
            } else {
                
                const ppeticion = document.getElementById('inputText');
                const regex = /^(GET|POST|PUT|DELETE|PATCH|HEAD|OPTIONS|CONNECT|TRACE)\s+(\S+)/;
                const match = ppeticion.value.match(regex);

                if (!match) {
                    document.getElementById("toast").innerText = "Formato inválido. Debe iniciar con un Método HTTP válido (Ej: GET /ruta).";
                    return; // Detenemos la ejecución aquí
                }

                const rawPeticion = window.unescapeString(ppeticion.value).replace(/\r?\n/g, '\r\n');
                fetch("{% url 'guardar_peticion' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        "nroPeticion" : nro,
                        "dominio": pdominio.value,
                        "metodo": match[1],
                        "url": match[2],
                        "peticion": rawPeticion
                    })
                })
                    .then(response => {
                        if (!response.ok) {
                            // Esto envía el error al bloque .catch de abajo
                            throw new Error(response.status);
                        }
                        window.location.href = "{% url 'solicitudes' %}";
                    })
                    .catch(error => {
                        // Aquí llega cualquier error (de red o el que lanzamos arriba)
                        document.getElementById("toast").innerText = "La petición es inválida. Código: " + error.message;
                    });

            }

        }
    </script>
</body>

</html>
